services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3883:3000"
    # NOTE: don't use `env_file` for Portainer stacks — Portainer will try to
    # read listed files on its host and fail if they don't exist. Keep variables
    # declared below (interpolated with ${VAR}) so they can be provided via:
    #  - Local CLI: `docker compose --env-file .env.local up` or `ENV_FILE=stack.env docker compose up`
    #  - Portainer UI: add variables in "Environment variables" when creating the Stack
    #  - Docker Secrets (recommended for sensitive values)
    environment:
      NODE_ENV: ${NODE_ENV:-production} # No need to tweak this

      # Spotify Configuration
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:3883/api/auth/callback}

      # Application URL
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:3883}

      # Navidrome Configuration (optional - can configure via UI)
      # NAVIDROME_URL: ${NAVIDROME_URL}
      # NAVIDROME_USERNAME: ${NAVIDROME_USERNAME}
      # NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
    restart: unless-stopped

  # Optional: Navidrome instance for testing
  # Uncomment to use a local Navidrome server
  # navidrome:
  #   image: deluan/navidrome:latest
  #   ports:
  #     - "4533:4533"
  #   environment:
  #     - ND_MULTIUSER=true
  #     - ND_INITIAL_USER=admin
  #     - ND_INITIAL_USER_PASSWORD=admin
  #     - ND音乐库路径=/music
  #   volumes:
  #     - ./music:/music
  #     - ./data:/data
  #   restart: unless-stopped
